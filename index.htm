<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grooming Master | Platon Games</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.2);
            --border: rgba(255, 255, 255, 0.3);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0f0f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Loading Screen */
        #loader-screen {
            position: absolute;
            z-index: 200;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .loader-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            width: 300px;
        }

        .progress-bar {
            width: 100%;
            height: 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #2ecc71;
            transition: width 0.1s ease;
        }

        /* Character Selection */
        #selection-screen {
            position: absolute;
            z-index: 100;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .menu-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: var(--shadow);
            text-align: center;
            max-height: 80vh;
            overflow-y: auto;
            max-width: 90%;
        }

        h1 { color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); margin-bottom: 30px; }

        .char-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        @media (max-width: 600px) {
            .char-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .char-btn {
            background: white;
            border: none;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .char-btn:hover { transform: scale(1.05); background: #f8f8f8; }

        /* Game UI */
        #game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 50;
            pointer-events: none;
        }

        .score-box {
            background: var(--glass);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        /* Character Display */
        #character-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            pointer-events: none;
        }

        /* Comb Cursor */
        #comb {
            position: fixed;
            width: 80px;
            height: auto;
            pointer-events: none;
            z-index: 90;
            transform: translate(-50%, -50%);
            display: none;
        }

        /* Particles */
        .hair {
            position: fixed;
            pointer-events: none;
            z-index: 40;
            width: 4px;
            height: 12px;
            border-radius: 2px;
        }

        /* Screamer */
        #screamer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 200;
            background: black;
            display: none;
            justify-content: center;
            align-items: center;
        }

        #screamer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .shake {
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        footer {
            position: absolute;
            bottom: 10px;
            font-size: 12px;
            color: #666;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>

<!-- Loader Screen -->
<div id="loader-screen">
    <div class="loader-box">
        <h2 style="margin: 0 0 10px 0;">Завантаження гри...</h2>
        <div id="loader-text">0%</div>
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
    </div>
</div>

<div id="game-container">
    <div id="game-ui">
        <div class="score-box">Очки: <span id="score">0</span></div>
    </div>

    <img id="character-img" src="" alt="Hero">
    
    <img id="comb" src="Comb.png" alt="Comb">

    <div id="screamer">
        <img id="screamer-img" src="" alt="SCREAM">
    </div>

    <div id="selection-screen" style="display: none;">
        <div class="menu-card">
            <h1>Обери героя для догляду</h1>
            <div class="char-grid">
                <!-- Старі герої -->
                <button class="char-btn" onclick="startGame('Tito')">Тіто</button>
                <button class="char-btn" onclick="startGame('Smartik')">Смартик</button>
                <button class="char-btn" onclick="startGame('Junior')">Джуніор</button>
                <button class="char-btn" onclick="startGame('Fil')">Філ</button>
                <button class="char-btn" onclick="startGame('Milka')">Мілка</button>
                <button class="char-btn" onclick="startGame('Bark')">Барк</button>
                
                <!-- Нові 14 героїв -->
                <button class="char-btn" onclick="startGame('Persik')">Персик</button>
                <button class="char-btn" onclick="startGame('Spike')">Спайк</button>
                <button class="char-btn" onclick="startGame('Alyonka')">Альонка</button>
                <button class="char-btn" onclick="startGame('Lilu')">Лілу</button>
                <button class="char-btn" onclick="startGame('Manya')">Маня</button>
                <button class="char-btn" onclick="startGame('Liza')">Ліза</button>
                <button class="char-btn" onclick="startGame('Grivna')">Гривна</button>
                <button class="char-btn" onclick="startGame('Ben')">Бен</button>
                <button class="char-btn" onclick="startGame('Goldi')">Голді</button>
                <button class="char-btn" onclick="startGame('Raf')">Раф</button>
                <button class="char-btn" onclick="startGame('Veles')">Велес</button>
                <button class="char-btn" onclick="startGame('Masha')">Маша</button>
                <button class="char-btn" onclick="startGame('Brilliantik')">Брілліантік</button>
                <button class="char-btn" onclick="startGame('Richik')">Річік</button>
            </div>
        </div>
        <footer>Author: Platon | Platon Games v6.7</footer>
    </div>
</div>

<audio id="snd-rock" src="Rock.mp3"></audio>
<audio id="snd-scream" src="Scream.mp3"></audio>

<script>
    const config = {
        Tito: { hair: ['#000000'] },
        Smartik: { hair: ['#D2691E', '#FFD700'] },
        Junior: { hair: ['#808080'] },
        Fil: { hair: ['#FFFFFF'] },
        Milka: { hair: ['#FFA500', '#000000', '#FFFFFF'] },
        Bark: { hair: ['#808080'] },
        // Конфігурація для нових героїв
        Persik: { hair: ['#FFCC99', '#FFA07A'] },
        Spike: { hair: ['#4682B4', '#333333'] },
        Alyonka: { hair: ['#FFB6C1', '#FF69B4'] },
        Lilu: { hair: ['#E6E6FA', '#DA70D6'] },
        Manya: { hair: ['#CD853F', '#8B4513'] },
        Liza: { hair: ['#FFF0F5', '#FF1493'] },
        Grivna: { hair: ['#228B22', '#85BB65'] },
        Ben: { hair: ['#708090', '#2F4F4F'] },
        Goldi: { hair: ['#FFD700', '#FFA500'] },
        Raf: { hair: ['#D3D3D3', '#A9A9A9'] },
        Veles: { hair: ['#4B0082', '#8A2BE2'] },
        Masha: { hair: ['#FFE4E1', '#FFC0CB'] },
        Brilliantik: { hair: ['#00FFFF', '#7FFFD4', '#1E90FF'] },
        Richik: { hair: ['#3E2723', '#5D4037'] }
    };

    let currentHero = '';
    let score = 0;
    let isLooking = false;
    let canBeCaught = false;
    let gameActive = false;
    let lookTimer;
    let reactionTimer;
    let turnFrequency = 5000;
    let lastX = 0;
    let lastY = 0;

    // Спеціальний трекер для Брілліантік
    let brilliantikStage = 1;
    let brilliantikTimerActive = false;

    const charImg = document.getElementById('character-img');
    const comb = document.getElementById('comb');
    const scoreText = document.getElementById('score');
    const screamer = document.getElementById('screamer');
    const screamerImg = document.getElementById('screamer-img');
    const rockSnd = document.getElementById('snd-rock');
    const screamSnd = document.getElementById('snd-scream');

    // Перелік усіх картинок для попереднього завантаження (Preloader)
    const imagesToPreload = [
        'Comb.png',
        'Tito.png', 'Tito2.png', 'Tito3.png',
        'Smartik.png', 'Smartik2.png', 'Smartik3.png',
        'Junior.png', 'Junior2.png', 'Junior3.png',
        'Fil.png', 'Fil2.png', 'Fil3.png',
        'Milka.png', 'Milka2.png', 'Milka3.png',
        'Bark.png', 'Bark2.png', 'Bark3.png',
        'Persik.png', 'Persik2.png', 'Persik3.png',
        'Spike.png', 'Spike2.png', 'Spike3.png',
        'Alyonka.png', 'Alyonka2.png', 'Alyonka3.png',
        'Lilu.png', 'Lilu2.png', 'Lilu3.png',
        'Manya.png', 'Manya2.png', 'Manya3.png',
        'Liza.png', 'Liza2.png', 'Liza3.png',
        'Grivna.png', 'Grivna2.png', 'Grivna3.png',
        'Ben.png', 'Ben2.png', 'Ben3.png',
        'Goldi.png', 'Goldi2.png', 'Goldi3.png',
        'Raf.png', 'Raf2.png', 'Raf3.png',
        'Veles.png', 'Veles2.png', 'Veles3.png',
        'Masha.png', 'Masha2.png', 'Masha3.png',
        'Brilliantik.png', 'Brilliantik2.png', 'Brilliantik3.png',
        'Richik.png', 'Richik2.png', 'Richik3.png'
    ];

    // Функція запуску Preloader-а
    function preloadImages() {
        let loadedCount = 0;
        const totalImages = imagesToPreload.length;
        const fill = document.getElementById('progress-fill');
        const text = document.getElementById('loader-text');

        imagesToPreload.forEach(src => {
            const img = new Image();
            img.src = src;
            img.onload = img.onerror = () => {
                loadedCount++;
                const percent = Math.floor((loadedCount / totalImages) * 100);
                fill.style.width = percent + '%';
                text.innerText = percent + '%';

                if (loadedCount === totalImages) {
                    setTimeout(() => {
                        document.getElementById('loader-screen').style.display = 'none';
                        document.getElementById('selection-screen').style.display = 'flex';
                    }, 500);
                }
            };
        });
    }

    // Запускаємо завантаження при старті сторінки
    window.onload = preloadImages;

    function startGame(hero) {
        currentHero = hero;
        document.getElementById('selection-screen').style.display = 'none';
        
        // Виняток для рибки Brilliantik
        if (currentHero === 'Brilliantik') {
            brilliantikStage = 1;
            brilliantikTimerActive = false;
            charImg.src = 'Brilliantik.png';
        } else {
            charImg.src = `${hero}.png`;
        }
        
        comb.style.display = 'block';
        gameActive = true;

        // Для Брілліантік стандартний таймер обертання не потрібен
        if (currentHero !== 'Brilliantik') {
            scheduleLook();
        }
    }

    // Рух курсора/пальця
    function handleMove(e) {
        if (!gameActive) return;

        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;

        comb.style.left = x + 'px';
        comb.style.top = y + 'px';

        // Перевірка руху для нарахування очок
        const dist = Math.hypot(x - lastX, y - lastY);
        if (dist > 2) {
            if (currentHero === 'Brilliantik') {
                // Особлива логіка розчісування Brilliantik
                score += 0.2;
                scoreText.innerText = Math.floor(score);
                createHair(x, y);

                if (brilliantikStage === 1) {
                    brilliantikStage = 2;
                    charImg.src = 'Brilliantik2.png';
                } else if (brilliantikStage === 2) {
                    brilliantikStage = 3;
                    charImg.src = 'Brilliantik3.png';
                    
                    // Повернення в начало після 3 секунд без скрімера
                    if (!brilliantikTimerActive) {
                        brilliantikTimerActive = true;
                        gameActive = false; // блокуємо подальші дії
                        setTimeout(() => {
                            location.reload();
                        }, 3000);
                    }
                }
            } else {
                // Стандартна логіка для інших героїв
                if (isLooking && canBeCaught) {
                    gameOver();
                } else if (!isLooking) {
                    score += 0.2;
                    scoreText.innerText = Math.floor(score);
                    createHair(x, y);
                }
            }
        }
        lastX = x;
        lastY = y;
    }

    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', handleMove);

    function createHair(x, y) {
        const h = document.createElement('div');
        h.className = 'hair';
        const colors = config[currentHero].hair;
        h.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        h.style.left = x + 'px';
        h.style.top = y + 'px';
        h.style.transform = `rotate(${Math.random() * 360}deg)`;
        
        document.body.appendChild(h);

        const animX = (Math.random() - 0.5) * 100;
        const animY = Math.random() * 100 + 50;

        h.animate([
            { transform: `translate(0,0) rotate(0deg)`, opacity: 1 },
            { transform: `translate(${animX}px, ${animY}px) rotate(720deg)`, opacity: 0 }
        ], {
            duration: 1000,
            easing: 'ease-out'
        }).onfinish = () => h.remove();
    }

    function scheduleLook() {
        if (!gameActive) return;
        
        const time = Math.random() * turnFrequency + 2000;
        lookTimer = setTimeout(() => {
            turnToPlayer();
        }, time);
    }

    function turnToPlayer() {
        isLooking = true;
        charImg.src = `${currentHero}2.png`;
        rockSnd.play();

        // 1.5 секунди на реакцію
        canBeCaught = false;
        reactionTimer = setTimeout(() => {
            canBeCaught = true;
        }, 1500);

        // Повертається назад через 2-3 секунди
        setTimeout(() => {
            if (gameActive) {
                isLooking = false;
                canBeCaught = false;
                charImg.src = `${currentHero}.png`;
                turnFrequency = Math.max(1000, turnFrequency - 300); // Складність зростає
                scheduleLook();
            }
        }, 2000 + Math.random() * 1500);
    }

    function gameOver() {
        gameActive = false;
        clearTimeout(lookTimer);
        clearTimeout(reactionTimer);
        
        // Візуалізація скрімеру
        screamerImg.src = `${currentHero}3.png`;
        screamer.style.display = 'flex';
        document.body.classList.add('shake');
        screamSnd.play();

        setTimeout(() => {
            location.reload(); // Перезапуск через 3 секунди
        }, 3500);
    }
</script>

</body>
</html>
